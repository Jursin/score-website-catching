name: Build Catch.exe

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # 使用适当的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl pandas pyinstaller

      - name: Build Catch.py to EXE
        run: |
          pyinstaller --onefile --noconsole Catch.py  # 将 Catch.py 打包为单个 EXE 文件，并隐藏 CMD 窗口
        shell: cmd

      - name: Archive the EXE
        run: |
          mkdir -p dist
          copy dist\\Catch.exe dist\\Catch.exe

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v2
        with:
          name: Catch-exe
          path: dist/Catch.exe